    function useTypewriter(words, speed = 80, pause = 2000) {
      const [display, setDisplay] = useState('');
      const [wordIdx, setWordIdx] = useState(0);
      const [charIdx, setCharIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);

      useEffect(() => {
        const current = words[wordIdx];
        let timer;
        if (!deleting && charIdx < current.length) {
          timer = setTimeout(() => setCharIdx(c => c + 1), speed);
        } else if (!deleting && charIdx === current.length) {
          timer = setTimeout(() => setDeleting(true), pause);
        } else if (deleting && charIdx > 0) {
          timer = setTimeout(() => setCharIdx(c => c - 1), speed / 2);
        } else if (deleting && charIdx === 0) {
          setDeleting(false);
          setWordIdx(w => (w + 1) % words.length);
        }
        return () => clearTimeout(timer);
      }, [charIdx, deleting, wordIdx, words, speed, pause]);

      useEffect(() => {
        setDisplay(words[wordIdx].slice(0, charIdx));
      }, [charIdx, wordIdx, words]);

      return display;
    }

    function useIntersectionObserver(threshold = 0.15) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
          { threshold }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [threshold]);

      return [ref, visible];
    }

    function useActiveSection() {
      const [active, setActive] = useState('Home');

        const sections = NAV_LINKS.map(n => document.getElementById(n.toLowerCase()));
        const obs = new IntersectionObserver(
          entries => {
            entries.forEach(e => {
              if (e.isIntersecting) setActive(e.target.id.charAt(0).toUpperCase() + e.target.id.slice(1));
            });
          },
          { threshold: 0.4 }
        );
        sections.forEach(s => s && obs.observe(s));
        return () => obs.disconnect();
      }, []);
      return active;
    }

    /* ── Hero Section ── */
    function HeroSection() {
      const role = useTypewriter(ROLES, 75, 2200);
      const canvasRef = useRef(null);

      // Particle canvas
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let raf;
        let particles = [];

        const resize = () => {
          canvas.width = canvas.offsetWidth;
          canvas.height = canvas.offsetHeight;
        };
        resize();
        window.addEventListener('resize', resize);

        const rand = (min, max) => Math.random() * (max - min) + min;

        for (let i = 0; i < 60; i++) {
          particles.push({
            x: rand(0, canvas.width),
            y: rand(0, canvas.height),
            r: rand(0.5, 2),
            vx: rand(-0.3, 0.3),
            vy: rand(-0.3, 0.3),
            alpha: rand(0.1, 0.6),
            color: Math.random() > 0.5 ? '#6366F1' : '#06B6D4',
          });
        }

        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color + Math.floor(p.alpha * 255).toString(16).padStart(2, '0');
            ctx.fill();
          });
          raf = requestAnimationFrame(draw);
        };
        draw();

        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
      }, []);

                  <span className="font-mono text-xs text-slate-300 tracking-wide">Available for remote work</span>
                </div>

                {/* Name */}

              <p className="text-slate-400 text-base ml-10 mb-12">Open to opportunities, collaborations, and conversations</p>
            </FadeSection>

            <div className="grid lg:grid-cols-5 gap-10">
              {/* Left: contact info */}
              <FadeSection className="lg:col-span-2 space-y-4" delay={100}>
                <div className="glass-card rounded-2xl p-6">
                  <h3 className="font-display font-semibold text-lg mb-2">Let's Connect</h3>
                  <p className="text-slate-400 text-sm leading-relaxed mb-6">
                    Whether you have a project in mind, a remote opportunity, or just want to say hi — I'd love to hear from you. I typically respond within 24 hours.
                  </p>

                  <div className="space-y-3">
                    {contactLinks.map(({ icon, label, val, href, color }) => (
                      <a
                        key={label}
                        href={href}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="flex items-center gap-3 p-3 rounded-xl border border-white/5 hover:border-opacity-30 transition-all group"
                        style={{ '--hover-color': color }}
                        onMouseEnter={e => e.currentTarget.style.borderColor = color + '40'}
                        onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(255,255,255,0.05)'}
                      >
                        <div className="w-10 h-10 rounded-lg flex items-center justify-center text-xl flex-shrink-0"
                          style={{ background: color + '15', border: `1px solid ${color}25` }}>
                          {icon}
                        </div>
                        <div>
                          <div className="text-xs text-slate-500 font-mono">{label}</div>
                          <div className="text-sm text-slate-300 group-hover:text-white transition-colors">{val}</div>
                        </div>
                        <span className="ml-auto text-slate-600 group-hover:text-slate-400 text-sm transition-colors">↗</span>
                      </a>
                    ))}
                  </div>
                </div>

                <div className="glass-card rounded-2xl p-5 border border-emerald-500/20">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse-slow" />
                    <span className="font-mono text-xs text-emerald-400">Available for work</span>
                  </div>
                  <p className="text-slate-400 text-xs leading-relaxed">
                    Currently open to freelance projects, remote positions, and internship opportunities. Specializing in web systems, management platforms, and DMS solutions.
                  </p>
                </div>
              </FadeSection>

              {/* Right: contact form */}
              <FadeSection className="lg:col-span-3" delay={200}>
                <div className="glass-card rounded-2xl p-6">
                  {sent ? (
                    <div className="text-center py-12">
                      <div className="text-5xl mb-4">✅</div>
                      <h3 className="font-display font-bold text-xl mb-2 gradient-text">Message Sent!</h3>
                      <p className="text-slate-400 text-sm mb-6">Thanks for reaching out. I'll get back to you as soon as possible.</p>
                      <button
                        onClick={() => { setSent(false); setForm({ name:'', email:'', subject:'', message:'' }); }}
                        className="btn-outline px-4 py-2 rounded-lg text-sm text-slate-300"
                      >
                        Send Another
                      </button>
                    </div>
                  ) : (
                    <form onSubmit={handleSubmit} className="space-y-4">
                      <h3 className="font-display font-semibold text-lg mb-4">Send a Message</h3>

                      <div className="grid sm:grid-cols-2 gap-4">
                        {[
                          { name: 'name', label: 'Your Name', placeholder: 'Name', type: 'text' },
                          { name: 'email', label: 'Email Address', placeholder: 'email@example.com', type: 'email' },
                        ].map(({ name, label, placeholder, type }) => (
                          <div key={name}>
                            <label className="block font-mono text-xs text-slate-500 mb-1.5">{label}</label>
                            <input
                              type={type}
                              required
                              value={form[name]}
                              onChange={e => setForm({ ...form, [name]: e.target.value })}
                              placeholder={placeholder}
                              className="w-full px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-slate-200 text-sm placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 focus:bg-indigo-500/5 transition-colors"
                            />
                          </div>
                        ))}
                      </div>

                      <div>
                        <label className="block font-mono text-xs text-slate-500 mb-1.5">Subject</label>
                        <input
                          type="text"
                          required
                          value={form.subject}
                          onChange={e => setForm({ ...form, subject: e.target.value })}
                          placeholder="Project inquiry / Remote opportunity / Hello"
                          className="w-full px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-slate-200 text-sm placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 focus:bg-indigo-500/5 transition-colors"
                        />
                      </div>

                      <div>
                        <label className="block font-mono text-xs text-slate-500 mb-1.5">Message</label>
                        <textarea
                          required
                          rows={5}
                          value={form.message}
                          onChange={e => setForm({ ...form, message: e.target.value })}
                          placeholder="Tell me about your project, opportunity, or just say hi..."
                          className="w-full px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-slate-200 text-sm placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 focus:bg-indigo-500/5 transition-colors resize-none"
                        />
                      </div>

                      <button
                        type="submit"
                        disabled={sending}
                        className="btn-primary w-full py-3 rounded-xl font-display font-semibold text-white text-sm flex items-center justify-center gap-2"
                      >
                        {sending ? (
                          <>
                            <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                            Sending...
                          </>
                        ) : (
                          <>
                            <span>📤</span> Send Message
                          </>
                        )}
                      </button>

                      <p className="text-center text-slate-600 text-xs font-mono mt-2">
                      </p>
                    </form>
                  )}
                </div>
              </FadeSection>
            </div>
          </div>
        </section>
      );
    }

    /* ── Footer ── */
    function Footer() {
      return (
        <footer className="border-t border-white/5 py-10">
          <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex flex-col sm:flex-row items-center justify-between gap-6">
              <div>
                <div className="font-display font-bold text-xl mb-1">
                  <span className="gradient-text">Khalil</span>
                  <span className="text-slate-500 font-mono text-sm ml-2">{'</>'}</span>
                </div>
                <p className="text-slate-500 text-xs">Full-Stack Developer · Abuja, Nigeria</p>
              </div>

              <div className="flex items-center gap-4">
                {[
                  { icon: '📧', href: 'abdullahimuhammadkhalil5@gmail.com', label: 'Email' },
                  { icon: '💼', href: 'https://linkedin.com/in/abdullahimuhammadkhalil', label: 'LinkedIn' },
                  { icon: '🐙', href: 'https://github.com/Abdul1571-ai', label: 'GitHub' },
                ].map(({ icon, href, label }) => (
                  <a
                    key={label}
                    href={href}
                    target="_blank"
                    rel="noopener noreferrer"
                    title={label}
                    className="w-9 h-9 rounded-lg glass-card border border-white/5 flex items-center justify-center text-base hover:border-indigo-500/30 transition-all hover:scale-110"
                  >
                    {icon}
                  </a>
                ))}
              </div>
            </div>

            <div className="mt-8 pt-6 border-t border-white/5 flex flex-col sm:flex-row justify-between items-center gap-2 text-slate-600 text-xs">
              <p>© {new Date().getFullYear()} Khalil Abdullahi Muhammad. All rights reserved.</p>
              <p className="font-mono">Built with React · CSS · ❤️</p>
            </div>
          </div>
        </footer>
      );
    }

    /* ── Scroll-to-top button ── */
    function ScrollTopButton() {
      const [show, setShow] = useState(false);
      useEffect(() => {
        const onScroll = () => setShow(window.scrollY > 500);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      return show ? (
        <button
          onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
          className="fixed bottom-6 right-6 z-40 w-11 h-11 rounded-xl btn-primary flex items-center justify-center text-white shadow-lg shadow-indigo-500/30 hover:scale-110 transition-all"
          title="Back to top"
        >
          ↑
        </button>
      ) : null;
    }

    /* ─────────────────────────────────────────
       APP ROOT
    ───────────────────────────────────────── */
    function App() {
      const [dark, setDark] = useState(true);

      // Hide loader
      useEffect(() => {
        const loader = document.getElementById('loader');
        if (loader) setTimeout(() => loader.classList.add('hidden'), 1200);
      }, []);

      return (
        <div>
          <Navbar dark={dark} setDark={setDark} />
          <main>
            <HeroSection />
            <AboutSection />
            <SkillsSection />
            <ProjectsSection />
            <ExperienceSection />
            <ContactSection />
          </main>
          <Footer />
          <ScrollTopButton />
        </div>
      );
    }

    /* ─── Render ─── */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
